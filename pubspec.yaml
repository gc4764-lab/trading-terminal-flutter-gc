name: trading_terminal
description: Professional Multi-Broker Trading Terminal
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: ^23.2.7
  flutter_staggered_grid_view: ^0.7.0
  draggable_home: ^1.0.4
  window_manager: ^0.3.9
  multi_window: ^0.3.0
  
  # State Management
  provider: ^6.1.1
  riverpod: ^2.4.0
  
  # Data & Networking
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  sqflite: ^2.3.0
  shared_preferences: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Charting & Technical Analysis
  ta: ^0.5.4
  tradingview_widget: ^1.0.0
  
  # Database
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.18
  
  # Utils
  intl: ^0.18.1
  path_provider: ^2.1.1
  url_launcher: ^6.2.1
  flutter_local_notifications: ^16.3.0
  
  # Authentication
  local_auth: ^2.1.7
  
  # Performance
  flutter_native_splash: ^2.3.8
  flutter_screenutil: ^5.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  drift_dev: ^2.14.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/chart_themes/
    
  
  
